<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Location de Voitures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🚗 Location de Voitures</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/vehicles/">Véhicules</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="/rentals/history/">Mes Locations</a>
                    <a class="nav-link" href="/rentals/profile/">Mon Profil</a>
                    <form method="POST" action="/logout/" style="display:inline;">
                    {% csrf_token %}
                     <button type="submit" class="nav-link btn btn-link" style="color:white;">Déconnexion</button>
</form>
                {% else %}
                    <a class="nav-link" href="/login/">Connexion</a>
                    <a class="nav-link" href="/rentals/register/">S'inscrire</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
