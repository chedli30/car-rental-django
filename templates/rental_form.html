{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">📅 Réserver un Véhicule</h2>

        <div class="card mb-4">
            <div class="card-body">
                <h5>{{ vehicle.brand }} {{ vehicle.model }}</h5>
                <p>💰 <strong>{{ vehicle.price_per_day }} DT/jour</strong></p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Date de début</label>
                <input type="date" name="start_date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date de fin</label>
                <input type="date" name="end_date" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Confirmer la Réservation</button>
            <a href="/vehicles/" class="btn btn-secondary w-100 mt-2">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
