{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">👤 Mon Profil</h2>
        <div class="card">
            <div class="card-body text-center">
                {% if profile.photo %}
                    <img src="{{ profile.photo.url }}" class="rounded-circle mb-3" width="150" height="150" style="object-fit:cover;">
                {% else %}
                    <div class="rounded-circle bg-secondary d-inline-flex align-items-center justify-content-center mb-3" style="width:150px;height:150px;">
                        <span style="font-size:60px;">👤</span>
                    </div>
                {% endif %}
                <h4>{{ user.username }}</h4>
                <p class="text-muted">{{ user.email }}</p>
                <hr>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Changer la photo de profil</label>
                        <input type="file" name="photo" class="form-control" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Mettre à jour</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
